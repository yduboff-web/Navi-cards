<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--navy:#0B2545;--navy-mid:#1a4a8a;--bg:#f5f3ee;--ink:#1a1208;--muted:#8a7a5a}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--ink);font-size:15px}
.page{max-width:860px;margin:0 auto;padding:2rem 1.25rem}

/* ── Header ── */
.site-header{display:flex;align-items:center;gap:16px;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:2px solid rgba(201,168,76,0.3)}
.site-header img{width:68px;height:auto}
.site-header h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--navy);letter-spacing:.03em}
.site-header p{font-size:13px;color:var(--muted);margin-top:3px}

/* ── Name bar ── */
.name-bar{background:#fff;border:1px solid rgba(201,168,76,0.35);border-radius:10px;padding:.875rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:14px}
.name-bar label{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:.1em;white-space:nowrap}
.name-bar input{flex:1;font-family:'Cinzel',serif;font-size:15px;font-weight:600;border:none;border-bottom:1.5px solid rgba(201,168,76,0.4);border-radius:0;padding:4px 6px;color:var(--navy);background:transparent}
.name-bar input:focus{outline:none;border-bottom-color:var(--gold)}
.save-ok{font-size:11px;color:var(--gold);white-space:nowrap;font-family:'Cinzel',serif;letter-spacing:.06em;opacity:0;transition:opacity .3s}
.save-ok.show{opacity:1}

/* ── Character picker overlay ── */
#picker-overlay{position:fixed;inset:0;background:rgba(11,37,69,0.92);z-index:200;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;overflow-y:auto}
#picker-overlay h2{font-family:'Cinzel',serif;color:var(--gold);font-size:18px;letter-spacing:.06em;margin-bottom:.4rem}
#picker-overlay p{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:1.25rem;text-align:center}
.picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;width:100%;max-width:860px}
.picker-card{background:#fff;border:1.5px solid rgba(201,168,76,0.3);border-radius:10px;padding:.85rem 1rem;cursor:pointer;transition:all .2s;text-align:center}
.picker-card:hover:not(.taken){border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,0.3);transform:translateY(-1px)}
.picker-card.taken{background:#e8e8e8;border-color:#ccc;cursor:not-allowed;opacity:0.55}
.picker-card .pc-heb{font-size:16px;color:var(--navy);direction:rtl;font-weight:600;display:block;margin-bottom:4px}
.picker-card .pc-eng{font-family:'Cinzel',serif;font-size:9.5px;color:var(--muted);letter-spacing:.05em;display:block;margin-bottom:6px}
.picker-card.taken .pc-taken-by{font-family:'Cinzel',serif;font-size:9px;color:#c0392b;letter-spacing:.04em;margin-top:5px;display:block}
.picker-card:not(.taken) .pc-taken-by{display:none}
.fb-status{font-family:'Cinzel',serif;font-size:10px;color:rgba(255,255,255,0.4);margin-top:1rem;letter-spacing:.05em}

/* ── Cards list ── */
.cards-list{display:flex;flex-direction:column;gap:1.5rem;margin-bottom:1.5rem}
.card-panel{background:#fff;border:1px solid rgba(201,168,76,0.3);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-panel-header{background:var(--navy);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.card-panel-header span{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.07em}
.card-panel-body{padding:1.25rem}

/* ── Character selector inside card ── */
.char-selector-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:#f7f5f0;border-radius:8px;border:1px solid rgba(201,168,76,0.2)}
.char-selector-row label{font-family:'Cinzel',serif;font-size:9.5px;color:var(--muted);letter-spacing:.08em;white-space:nowrap}
.char-selector-row select{flex:1;font-family:'Crimson Pro',serif;font-size:14px;background:#fff;border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:6px 8px;color:var(--ink);cursor:pointer}
.char-selector-row select:focus{outline:none;border-color:var(--gold)}
.char-selector-row select option.taken-opt{color:#bbb}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-family:'Cinzel',serif;font-size:9.5px;color:var(--muted);letter-spacing:.08em}
input[type=text],textarea,select.inp-select{font-family:'Crimson Pro',serif;font-size:14px;background:#fafaf7;border:1px solid rgba(201,168,76,0.25);border-radius:6px;padding:7px 10px;color:var(--ink);width:100%;transition:border-color .2s}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--gold);background:#fff}
textarea{resize:none;line-height:1.6}
.word-counter{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;text-align:right;margin-top:3px;color:var(--muted);transition:color .2s}
.word-counter.warn{color:#b05a00}
.word-counter.over{color:#c0392b;font-weight:700}
.stats-title{font-family:'Cinzel',serif;font-size:10px;color:var(--navy);letter-spacing:.08em;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:14px}
.stat-row{display:flex;align-items:center;gap:8px}
.stat-name{font-family:'Cinzel',serif;font-size:10px;color:var(--navy);width:68px;flex-shrink:0;letter-spacing:.03em}
input[type=range]{flex:1;accent-color:var(--navy)}
.stat-val{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--navy);width:28px;text-align:right}

/* ── Image upload ── */
.image-section{margin-bottom:14px}
.image-label{font-family:'Cinzel',serif;font-size:9.5px;color:var(--muted);letter-spacing:.08em;display:block;margin-bottom:6px}
.image-upload-area{border:1.5px dashed rgba(201,168,76,0.4);border-radius:8px;padding:1rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;background:#fafaf7}
.image-upload-area:hover{border-color:var(--gold);background:#fff}
.image-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.image-upload-area .upload-prompt{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:.06em;pointer-events:none}
.image-preview-wrap{position:relative;display:inline-block;margin-top:8px}
.image-preview{width:120px;height:120px;object-fit:cover;border-radius:6px;border:1px solid rgba(201,168,76,0.3);display:block}
.image-clear{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--navy);border:none;color:var(--gold);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
.remove-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.06em;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer}
.remove-btn:hover{background:rgba(220,60,60,0.3);color:#fff}

/* ── Buttons ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:2rem}
button.act{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.07em;padding:10px 20px;border-radius:8px;border:1px solid rgba(201,168,76,0.4);background:transparent;color:var(--navy);cursor:pointer;transition:all .2s}
button.act:hover{background:rgba(201,168,76,0.1);border-color:var(--gold)}
button.act.primary{background:var(--navy);color:var(--gold);border-color:var(--navy)}
button.act.primary:hover{background:var(--navy-mid)}
button.act.export{border-color:rgba(40,140,70,0.4);color:#1a6035}
button.act.export:hover{background:rgba(40,140,70,0.08)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.07em;padding:10px 22px;border-radius:8px;border:1px solid rgba(201,168,76,0.4);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

/* ── Claimed badge on panel header ── */
.claimed-badge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;background:rgba(201,168,76,0.2);color:var(--gold);border-radius:4px;padding:2px 7px;margin-left:8px}

@media print{
  body{background:#fff}
  .btn-row,.remove-btn,.image-upload-area input[type=file],#picker-overlay{display:none!important}
  .card-panel{box-shadow:none;break-inside:avoid;page-break-inside:avoid}
}
</style>
</head>

  {id:'shovi',     heb:'שֹׁבִי בֶּן נָחָשׁ',           eng:'Shovi ben Nachash'},
  {id:'machir',    heb:'מָכִיר בֶּן עַמִּיאֵל',        eng:'Machir ben Ammiel'},
  {id:'adino',     heb:'עֲדִינוֹ הָעֶצְנִי',           eng:'Adino HaEtzni'},
  {id:'ira',       heb:'עִירָא הַיָּאִירִי',            eng:'Ira HaYairi'},
  {id:'rechav',    heb:'רֵכָב בֶּן רִמּוֹן',           eng:'Rechav ben Rimon'},
  {id:'baanah',    heb:'בַּעֲנָה בֶּן רִמּוֹן',        eng:'Baanah ben Rimon'}
];

/* ─────────────────────────────────────────────
   APP STATE
───────────────────────────────────────────── */
var STORE      = 'bha_navi_v1';
var NAME_K     = 'bha_navi_name_v1';
var CLAIM_K    = 'bha_navi_claim_v2';  // array of character ids this student claimed
var BLURB_LIMIT  = 40;
var LESSON_LIMIT = 15;
var cardCounter  = 0;
var imageData    = {};
var claimsData   = {};   // { charId: "Student Name" } — from Firebase
var myClaimIds   = [];   // array of char ids this student has claimed
var myStudentName = '';

var STATS = [
  {id:'s1',label:'Strength'},
  {id:'s2',label:'Wisdom'},
  {id:'s3',label:'Speech'},
  {id:'s4',label:'Loyalty'},
  {id:'s5',label:'Emunah'}
];

/* ─────────────────────────────────────────────
   FIREBASE LISTENER
───────────────────────────────────────────── */
function initFirebaseListener(){
  if(!window._fbDb){ setTimeout(initFirebaseListener, 200); return; }
  var claimsRef = window._fbRef(window._fbDb, 'claims');
  window._fbOnValue(claimsRef, function(snapshot){
    claimsData = snapshot.val() || {};
    renderPickerGrid();
    updateCardDropdowns();
    document.getElementById('fb-status').textContent = 'Live — updates in real time';
  });
}

/* ─────────────────────────────────────────────
   PICKER OVERLAY
───────────────────────────────────────────── */
function renderPickerGrid(){
  var grid = document.getElementById('picker-grid');
  if(!grid) return;
  grid.innerHTML = '';
  CHARACTERS.forEach(function(ch){
    var takenBy = claimsData[ch.id];
    var isMine  = myClaimIds.indexOf(ch.id) !== -1;
    var isTaken = takenBy && !isMine;

    var badge = isMine
      ? '<span class="pc-taken-by" style="color:var(--gold)">✓ Your character</span>'
      : (takenBy ? '<span class="pc-taken-by">Taken by ' + esc(takenBy) + '</span>' : '');

    card.innerHTML =
      '<span class="pc-heb">' + ch.heb + '</span>' +
      '<span class="pc-eng">' + ch.eng + '</span>' +
      badge;

    if(!isTaken){
      card.addEventListener('click', function(){ claimCharacter(ch.id); });
    }
    grid.appendChild(card);
  });
}

function claimCharacter(charId){
  var nameInput = document.getElementById('picker-name');
  var name = nameInput ? nameInput.value.trim() : '';
  if(!name){
    nameInput.style.borderColor = '#c0392b';
    nameInput.placeholder = 'Please enter your name first!';
    setTimeout(function(){ nameInput.style.borderColor = ''; nameInput.placeholder = 'Your name'; }, 2000);
    return;
  }
  if(claimsData[charId] && claimsData[charId] !== name){
    showToast('Already taken — choose another!');
    return;
  }
  if(myClaimIds.indexOf(charId) !== -1){
    showToast('You already have this character!');
    return;
  }

  myStudentName = name;
  myClaimIds.push(charId);
  localStorage.setItem(CLAIM_K, JSON.stringify({name: name, charIds: myClaimIds}));

  // Write to Firebase
  if(window._fbSet){
    window._fbSet(window._fbRef(window._fbDb, 'claims/' + charId), name);
  }

  // First character — open main page; subsequent — just add a card
  if(myClaimIds.length === 1){
    openMainPage(charId, name);
  } else {
    document.getElementById('picker-overlay').style.display = 'none';
    addCard(null, charId);
    saveAll();
  }
}

function openMainPage(charId, studentName){
  document.getElementById('picker-overlay').style.display = 'none';
  document.getElementById('main-page').style.display = 'block';
  document.getElementById('student-name').value = studentName;
  localStorage.setItem(NAME_K, studentName);
  loadAll(charId);
}

/* ─────────────────────────────────────────────
   WORD COUNTING
───────────────────────────────────────────── */
function countWords(str){
  var s = str.replace(/\s+/g,' ').trim();
  if(!s) return 0;
  return s.split(' ').length;
}
function updateWordCounter(el, counterId, limit){
  var words = countWords(el.value);
  var ctr = document.getElementById(counterId);
  if(!ctr) return;
  ctr.textContent = words + ' / ' + limit + ' words';
  ctr.className = 'word-counter';
  if(words > limit * 0.85 && words <= limit) ctr.className = 'word-counter warn';
  if(words > limit) ctr.className = 'word-counter over';
}
function enforceWordLimit(el, limit){
  var words = el.value.replace(/\s+/g,' ').trim().split(' ');
  if(countWords(el.value) > limit) el.value = words.slice(0, limit).join(' ');
}

/* ─────────────────────────────────────────────
   SAVE / LOAD
───────────────────────────────────────────── */
function saveAll(){
  try{
    localStorage.setItem(STORE, JSON.stringify(collectAll()));
    localStorage.setItem(NAME_K, document.getElementById('student-name').value.trim());
    try{ localStorage.setItem(STORE + '_imgs', JSON.stringify(imageData)); }catch(e){}
    var el = document.getElementById('save-ok');
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 1800);
  }catch(e){}
}

function loadAll(forcedCharId){
  try{
    var n = localStorage.getItem(NAME_K);
    if(n) document.getElementById('student-name').value = n;
    var c = localStorage.getItem(STORE);
    var saved = c ? JSON.parse(c) : [];
    var imgs = localStorage.getItem(STORE + '_imgs');
    if(imgs) imageData = JSON.parse(imgs);
    if(saved.length === 0){ addCard(null, forcedCharId); }
    else { for(var i = 0; i < saved.length; i++){ addCard(saved[i], forcedCharId); } }
  }catch(e){ addCard(null, forcedCharId); }
}

function collectAll(){
  var panels = document.querySelectorAll('.card-panel');
  var result = [];
  for(var i = 0; i < panels.length; i++){
    var panel = panels[i];
    var pid   = panel.getAttribute('data-id');
    var statsObj = {};
    for(var j = 0; j < STATS.length; j++){
      var slider = document.getElementById(STATS[j].id + '_' + pid);
      statsObj[STATS[j].id] = slider ? parseInt(slider.value) : 50;
    }
    result.push({
      id:    pid,
      heb:   getVal(panel,'inp-heb'),
      title: getVal(panel,'inp-title'),
      blurb: getVal(panel,'inp-blurb'),
      pasuk: getVal(panel,'inp-pasuk'),
      lesson:getVal(panel,'inp-lesson'),
      stats: statsObj
    });
  }
  return result;
}
function getVal(panel, cls){
  var el = panel.querySelector('.' + cls);
  return el ? el.value.trim() : '';
}

/* ─────────────────────────────────────────────
   ADD CARD
───────────────────────────────────────────── */
function addCard(data, forcedCharId){
  cardCounter++;
  var num = cardCounter;
  var pid = data ? data.id : ('c' + Date.now() + '_' + num);
  var d   = data || {heb:'',title:'',blurb:'',pasuk:'',lesson:'',stats:{s1:50,s2:50,s3:50,s4:50,s5:50}};

  // If a character was just claimed and card has no heb set, pre-fill
  var presetChar = null;
  if(forcedCharId && !d.heb){
    for(var ci = 0; ci < CHARACTERS.length; ci++){
      if(CHARACTERS[ci].id === forcedCharId){ presetChar = CHARACTERS[ci]; break; }
    }
    if(presetChar){ d.heb = presetChar.heb; d.title = presetChar.eng; }
  }

  var statsRows = '';
  for(var i = 0; i < STATS.length; i++){
    var s = STATS[i];
    var v = (d.stats && d.stats[s.id]) ? d.stats[s.id] : 50;
    statsRows += '<div class="stat-row">'
      + '<span class="stat-name">' + s.label + '</span>'
      + '<input type="range" min="1" max="100" value="' + v + '" step="1" id="' + s.id + '_' + pid + '">'
      + '<span class="stat-val" id="' + s.id + 'v_' + pid + '">' + v + '</span>'
      + '</div>';
  }

  var imgSection = '<div class="image-section">'
    + '<span class="image-label">Card Image (upload your Canva design or any image)</span>'
    + '<div class="image-upload-area" id="upload-area-' + pid + '">'
    + '<input type="file" accept="image/*" id="file-inp-' + pid + '">'
    + '<div class="upload-prompt" id="upload-prompt-' + pid + '">Click or drag an image here</div>'
    + '</div>'
    + '<div id="preview-wrap-' + pid + '" style="display:none;text-align:center;margin-top:8px">'
    + '<div class="image-preview-wrap">'
    + '<img class="image-preview" id="img-preview-' + pid + '" src="" alt="preview">'
    + '<button class="image-clear" id="img-clear-' + pid + '" title="Remove image">x</button>'
    + '</div>'
    + '</div>'
    + '</div>';

  // Build character selector row
  var selectorRow = buildCharSelectorHTML(pid, d.heb);

  var panel = document.createElement('div');
  panel.className = 'card-panel';
  panel.setAttribute('data-id', pid);
  panel.innerHTML = ''
    + '<div class="card-panel-header">'
    + '<span>Character ' + num + '<span class="claimed-badge" id="claimed-badge-' + pid + '"></span></span>'
    + '<button class="remove-btn">Remove</button>'
    + '</div>'
    + '<div class="card-panel-body">'
    + imgSection
    + selectorRow
    + '<div class="form-grid">'
    + '<div class="form-group"><label>Hebrew Name</label>'
    + '<input type="text" class="inp-heb" placeholder="דָּוִד הַמֶּלֶךְ" dir="rtl" value="' + esc(d.heb) + '"></div>'
    + '<div class="form-group"><label>English Title</label>'
    + '<input type="text" class="inp-title" placeholder="e.g. The King" value="' + esc(d.title) + '"></div>'
    + '<div class="form-group full"><label>Blurb (max ' + BLURB_LIMIT + ' words)</label>'
    + '<textarea class="inp-blurb" rows="4" placeholder="Who is this person and what did they do?">' + esc(d.blurb) + '</textarea>'
    + '<div class="word-counter" id="blurb-count-' + pid + '">0 / ' + BLURB_LIMIT + ' words</div></div>'
    + '<div class="form-group"><label>Key Pasuk</label>'
    + '<input type="text" class="inp-pasuk" placeholder="ש״ב ה:ד" dir="rtl" value="' + esc(d.pasuk) + '"></div>'
    + '<div class="form-group"><label>Life Lesson (max ' + LESSON_LIMIT + ' words)</label>'
    + '<input type="text" class="inp-lesson" placeholder="What does this person teach you?" value="' + esc(d.lesson) + '"></div>'
    + '<div class="word-counter" id="lesson-count-' + pid + '" style="grid-column:2;margin-top:-10px">0 / ' + LESSON_LIMIT + ' words</div>'
    + '</div>'
    + '<div class="stats-title">Stats &mdash; Rate 1 to 100</div>'
    + '<div class="stats-grid">' + statsRows + '</div>'
    + '</div>';

  document.getElementById('cards-list').appendChild(panel);

  // Wire up character selector
  var sel = panel.querySelector('.char-select');
  if(sel){
    sel.addEventListener('change', function(){
      var chosen = null;
      for(var ci = 0; ci < CHARACTERS.length; ci++){
        if(CHARACTERS[ci].id === sel.value){ chosen = CHARACTERS[ci]; break; }
      }
      if(chosen){
        panel.querySelector('.inp-heb').value   = chosen.heb;
        panel.querySelector('.inp-title').value = chosen.eng;
        saveAll();
      }
    });
  }

  var blurbTA  = panel.querySelector('.inp-blurb');
  var lessonIN = panel.querySelector('.inp-lesson');
  updateWordCounter(blurbTA,  'blurb-count-'  + pid, BLURB_LIMIT);
  updateWordCounter(lessonIN, 'lesson-count-' + pid, LESSON_LIMIT);
  blurbTA.addEventListener('input', function(){
    enforceWordLimit(blurbTA, BLURB_LIMIT);
    updateWordCounter(blurbTA, 'blurb-count-' + pid, BLURB_LIMIT);
    saveAll();
  });
  lessonIN.addEventListener('input', function(){
    enforceWordLimit(lessonIN, LESSON_LIMIT);
    updateWordCounter(lessonIN, 'lesson-count-' + pid, LESSON_LIMIT);
    saveAll();
  });

  var otherInputs = panel.querySelectorAll('.inp-heb, .inp-title, .inp-pasuk');
  for(var k = 0; k < otherInputs.length; k++){
    otherInputs[k].addEventListener('input', saveAll);
  }
  for(var j = 0; j < STATS.length; j++){
    (function(sid, pid2){
      var slider  = document.getElementById(sid + '_' + pid2);
      var display = document.getElementById(sid + 'v_' + pid2);
      if(slider && display){
        slider.oninput = function(){ display.textContent = slider.value; saveAll(); };
      }
    })(STATS[j].id, pid);
  }

  panel.querySelector('.remove-btn').onclick = function(){
    if(document.querySelectorAll('.card-panel').length <= 1){
      showToast('Keep at least one character'); return;
    }
    if(confirm('Remove this character?')){
      delete imageData[pid];
      panel.remove();
      saveAll();
    }
  };

  // Image upload
  var fileInp      = document.getElementById('file-inp-' + pid);
  var previewWrap  = document.getElementById('preview-wrap-' + pid);
  var imgPreview   = document.getElementById('img-preview-' + pid);
  var uploadPrompt = document.getElementById('upload-prompt-' + pid);
  var clearBtn     = document.getElementById('img-clear-' + pid);

  if(imageData[pid]){
    imgPreview.src = imageData[pid];
    previewWrap.style.display = 'block';
    uploadPrompt.textContent = 'Click to change image';
  }
  fileInp.onchange = function(){
    var file = fileInp.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      imgPreview.src = e.target.result;
      previewWrap.style.display = 'block';
      uploadPrompt.textContent = 'Click to change image';
      imageData[pid] = e.target.result;
      saveAll();
    };
    reader.readAsDataURL(file);
  };
  clearBtn.onclick = function(e){
    e.stopPropagation();
    imgPreview.src = '';
    previewWrap.style.display = 'none';
    uploadPrompt.textContent = 'Click or drag an image here';
    delete imageData[pid];
    fileInp.value = '';
    saveAll();
  };
}

/* ─────────────────────────────────────────────
   CHARACTER SELECTOR DROPDOWN
───────────────────────────────────────────── */
function buildCharSelectorHTML(pid, currentHeb){
  var opts = '<option value="">— Pick a character —</option>';
  for(var i = 0; i < CHARACTERS.length; i++){
    var ch = CHARACTERS[i];
    var takenBy = claimsData[ch.id];
    var isMine  = myClaimIds.indexOf(ch.id) !== -1;
    var disabled = (takenBy && !isMine) ? 'disabled class="taken-opt"' : '';
    var takenLabel = (takenBy && !isMine) ? ' (taken)' : '';
    var selected = (ch.heb === currentHeb) ? 'selected' : '';
    opts += '<option value="' + ch.id + '" ' + disabled + ' ' + selected + '>'
          + ch.heb + ' — ' + ch.eng + takenLabel + '</option>';
  }
  return '<div class="char-selector-row">'
    + '<label>Character</label>'
    + '<select class="char-select" id="char-sel-' + pid + '">' + opts + '</select>'
    + '</div>';
}

function updateCardDropdowns(){
  var panels = document.querySelectorAll('.card-panel');
  panels.forEach(function(panel){
    var pid = panel.getAttribute('data-id');
    var sel = document.getElementById('char-sel-' + pid);
    if(!sel) return;
    var currentVal = sel.value;
    var currentHeb = panel.querySelector('.inp-heb') ? panel.querySelector('.inp-heb').value : '';
    sel.innerHTML = buildCharSelectorHTML(pid, currentHeb).replace(/<div[^>]*>|<\/div>|<label[^>]*>.*?<\/label>/g,'');
    // Rebuild properly
    var wrapper = document.createElement('div');
    wrapper.innerHTML = buildCharSelectorHTML(pid, currentHeb);
    var newSel = wrapper.querySelector('select');
    if(newSel) sel.innerHTML = newSel.innerHTML;
  });
}

/* ─────────────────────────────────────────────
   EXCEL EXPORT
───────────────────────────────────────────── */
function exportExcel(){
  var name = document.getElementById('student-name').value.trim();
  if(!name){ showToast('Enter your name first'); return; }
  var data   = collectAll();
  var filled = [];
  for(var i = 0; i < data.length; i++){
    if(data[i].heb || data[i].title) filled.push(data[i]);
  }
  if(filled.length === 0){ showToast('Fill in at least one character'); return; }

  var rows = [['Hebrew Name','English Title','Blurb','Key Pasuk','Life Lesson','Strength','Wisdom','Speech','Loyalty','Emunah']];
  for(var i = 0; i < filled.length; i++){
    var c = filled[i];
    rows.push([c.heb, c.title, c.blurb, c.pasuk, c.lesson,
      c.stats.s1, c.stats.s2, c.stats.s3, c.stats.s4, c.stats.s5]);
  }
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:22},{wch:18},{wch:50},{wch:14},{wch:40},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Hero Cards');
  var meta = [['Student', name],['Date', new Date().toLocaleDateString()],['Characters', filled.length]];
  var ws2  = XLSX.utils.aoa_to_sheet(meta);
  ws2['!cols'] = [{wch:14},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Info');
  XLSX.writeFile(wb, name.replace(/\s+/g,'_') + '_navi_cards.xlsx');
  showToast('Downloaded ' + filled.length + ' card' + (filled.length===1?'':'s') + '!');
}

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
// "Add Character" — opens the picker to claim another character
document.getElementById('add-btn').onclick = function(){
  if(!myStudentName){
    showToast('Go back to the picker and enter your name first.');
    return;
  }
  // Pre-fill name in picker and show it
  var pName = document.getElementById('picker-name');
  if(pName) pName.value = myStudentName;
  document.getElementById('picker-overlay').style.display = 'flex';
};

document.getElementById('export-btn').onclick = exportExcel;

document.getElementById('change-char-btn').onclick = function(){
  if(confirm('Release ALL your characters and start over?')){
    // Remove all claims from Firebase
    if(window._fbRemove){
      for(var i = 0; i < myClaimIds.length; i++){
        window._fbRemove(window._fbRef(window._fbDb, 'claims/' + myClaimIds[i]));
      }
    }
    myClaimIds = [];
    myStudentName = '';
    localStorage.removeItem(CLAIM_K);
    document.getElementById('cards-list').innerHTML = '';
    cardCounter = 0;
    document.getElementById('main-page').style.display = 'none';
    document.getElementById('picker-overlay').style.display = 'flex';
    var pName = document.getElementById('picker-name');
    if(pName) pName.value = '';
  }
};

// On load — restore all previously claimed characters
(function(){
  var saved = localStorage.getItem(CLAIM_K);
  if(saved){
    try{
      var obj = JSON.parse(saved);
      // Support both old format {charId, name} and new {charIds, name}
      myStudentName = obj.name || '';
      if(obj.charIds && Array.isArray(obj.charIds)){
        myClaimIds = obj.charIds;
      } else if(obj.charId){
        myClaimIds = [obj.charId]; // migrate old single-claim format
      }
      // Re-assert all claims on Firebase
      if(myStudentName && window._fbSet){
        for(var i = 0; i < myClaimIds.length; i++){
          window._fbSet(window._fbRef(window._fbDb, 'claims/' + myClaimIds[i]), myStudentName);
        }
      }
      var pickerName = document.getElementById('picker-name');
      if(pickerName) pickerName.value = myStudentName;
      if(myClaimIds.length > 0){
        openMainPage(myClaimIds[0], myStudentName);
      }
    }catch(e){}
  }
  renderPickerGrid();
})();

</script>
